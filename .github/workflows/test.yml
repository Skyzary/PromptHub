name: test.yml

on:
  pull_request:
    branches: [ main, dev ]

jobs:
  quality-assurance:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Prettify code
        run: pnpm run prettify

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: prettify"
          file_pattern: '**/src/**/*.{ts,tsx,js,jsx,json,scss,css}'

      - name: Run Linter
        run: pnpm run lint

      - name: Run Shared Package Tests
        run: pnpm --filter @prompthub/shared test

      - name: Run Backend Tests
        run: pnpm --filter @prompthub/backend test -- --coverage

      - name: Run Frontend Tests
        run: pnpm --filter @prompthub/frontend test -- --coverage
